<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Typer - Ultimate MIC Breach</title>
    <style>
        /* Thiết lập giao diện tổng thể */
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0; font-size: 15px; overflow: hidden; user-select: none;
        }

        /* Hiệu ứng sọc màn hình CRT phủ lên toàn bộ trang */
        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 9999; pointer-events: none; opacity: 0.6;
        }

        /* --- 1. MÀN HÌNH DESKTOP --- */
        #desktop {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: radial-gradient(circle, #001500 0%, #000000 100%); z-index: 10;
        }
        .icon-container { position: absolute; top: 40px; right: 40px; display: flex; flex-direction: column; gap: 40px; }
        .icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 100px; text-align: center; transition: transform 0.2s, text-shadow 0.2s; }
        .icon:hover { transform: scale(1.1); text-shadow: 0 0 15px #00ff00; }
        .icon svg { width: 60px; height: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 8px #00ff00); }
        .icon span { font-weight: bold; }

        /* --- 2. MÀN HÌNH LOADING CÔNG NGHỆ CAO --- */
        #loading-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #000000; z-index: 20;
            flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Text chạy loạn xạ làm nền */
        #bg-logs {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: rgba(0, 255, 0, 0.15); font-size: 10px; line-height: 10px;
            white-space: pre-wrap; word-wrap: break-word; z-index: 21;
        }

        #giant-container { z-index: 22; display: flex; flex-direction: column; align-items: center; }

        .giant-text {
            font-size: clamp(2rem, 5vw, 6rem); /* Tự động co giãn theo màn hình */
            font-weight: bold; text-align: center; margin: 10px 0; text-transform: uppercase;
            opacity: 0; letter-spacing: 5px;
        }

        .giant-white { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.8); animation: textFlicker 0.1s forwards 5; }
        .giant-cyan { color: #00ffff; text-shadow: 0 0 30px #00ffff; animation: fadeInUp 0.5s forwards; }
        
        /* Hiệu ứng Glitch cực mạnh cho chữ đỏ */
        .glitch-text {
            position: relative; color: #ff3333; opacity: 1;
            text-shadow: 0 0 40px #ff0000;
            animation: shake 0.4s infinite;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; opacity: 0.8;
        }
        .glitch-text::before {
            left: 5px; text-shadow: -2px 0 #00ffff; background: #000;
            clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -5px; text-shadow: -2px 0 #00ff00; background: #000;
            clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%);
            animation: glitch-anim-2 1.5s infinite linear alternate-reverse;
        }

        @keyframes textFlicker { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); } 20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); } 60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); } 100% { clip-path: inset(30% 0 40% 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); } 20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); } 60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(80% 0 5% 0); } 100% { clip-path: inset(5% 0 80% 0); }
        }

        /* --- 3. MÀN HÌNH TERMINAL (Code 2 cột) --- */
        #terminal { display: none; width: 100%; height: 100vh; box-sizing: border-box; padding: 20px; gap: 20px; }
        #left-panel { flex: 7; overflow-y: auto; padding-right: 15px; }
        #left-panel::-webkit-scrollbar { width: 5px; } #left-panel::-webkit-scrollbar-thumb { background: #005500; }
        #boot-text, #console { white-space: pre-wrap; word-wrap: break-word; } #console { display: inline; }
        #right-panel { flex: 3; border: 1px solid #005500; background-color: rgba(0, 20, 0, 0.5); padding: 20px; display: flex; flex-direction: column; gap: 25px; box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.1); }
        .widget-title { border-bottom: 1px dashed #00ff00; padding-bottom: 5px; margin-bottom: 15px; font-weight: bold; color: #00ffff; text-shadow: 0 0 5px #00ffff; }

        /* Radar & Stats */
        .radar-container { display: flex; justify-content: center; }
        .radar { width: 180px; height: 180px; border-radius: 50%; border: 2px solid #00ff00; position: relative; overflow: hidden; background: linear-gradient(90deg, transparent 49.5%, #005500 50%, transparent 50.5%), linear-gradient(0deg, transparent 49.5%, #005500 50%, transparent 50.5%); box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .radar::before { content: ''; position: absolute; width: 50%; height: 50%; top: 0; left: 50%; transform-origin: 0% 100%; background: conic-gradient(from 90deg, rgba(0,255,0,0) 0deg, rgba(0,255,0,0.6) 90deg); animation: scan 2s linear infinite; }
        @keyframes scan { 100% { transform: rotate(360deg); } }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .stat-bar-bg { width: 100%; height: 10px; background-color: #002200; margin-bottom: 15px; }
        .stat-bar-fill { height: 100%; background-color: #ff3333; transition: width 0.3s ease; box-shadow: 0 0 8px #ff3333; }
        .color-red { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px #ff0000; } .color-yellow { color: #ffff00; text-shadow: 0 0 5px #ffff00; } .color-gray { color: #888888; } .color-cyan { color: #00ffff; text-shadow: 0 0 5px #00ffff; }

        /* Loading Bar & Utils */
        .cyber-loading-wrapper { margin: 15px 0; max-width: 500px; } .cyber-loading-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .cyber-bar-bg { width: 100%; height: 12px; background-color: rgba(0, 255, 0, 0.1); border: 1px solid #005500; position: relative; overflow: hidden; }
        .cyber-bar-fill { height: 100%; width: 0%; background-color: #00ff00; box-shadow: 0 0 10px #00ff00; transition: width 0.1s linear; }
        .cyber-hex-stream { font-size: 12px; color: #008800; margin-top: 5px; }
        .cursor { display: none; width: 10px; height: 18px; background-color: #00ff00; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Trạng thái Access Granted - Đổi màu Dashboard sang Cyan */
        body.granted { color: #00ffff !important; }
        body.granted .stat-bar-fill { background-color: #00ffff; box-shadow: 0 0 8px #00ffff;}
        body.granted .radar { border-color: #00ffff; background: linear-gradient(90deg, transparent 49.5%, #005555 50%, transparent 50.5%), linear-gradient(0deg, transparent 49.5%, #005555 50%, transparent 50.5%); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);}
        body.granted .radar::before { background: conic-gradient(from 90deg, rgba(0,255,255,0) 0deg, rgba(0,255,255,0.6) 90deg); }
        body.granted .color-red { color: #00ffff; text-shadow: 0 0 5px #00ffff; }

        #access-granted {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: transparent; color: #00ffff; padding: 20px 50px; font-size: 60px;
            font-weight: bold; border: 4px solid #00ffff; text-align: center; z-index: 1000;
            box-shadow: 0 0 40px #00ffff, inset 0 0 20px #00ffff; backdrop-filter: blur(5px);
            animation: pulse-glow 1.5s infinite alternate; text-shadow: 0 0 10px #ffffff;
        }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 20px #00ffff, inset 0 0 10px #00ffff; } 100% { box-shadow: 0 0 60px #00ffff, inset 0 0 30px #00ffff; } }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>

    <div id="desktop">
        <div class="icon-container">
            <div class="icon" onclick="startSequence()">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ff00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="11" x2="12" y2="17"></line>

    <div id="loading-screen">
        <div id="bg-logs"></div>
        <div id="giant-container"></div>

    <div id="terminal">
        <div id="left-panel">

            <div id="console"></div>
            <span id="cursor" class="cursor"></span>
        </div>
        <div id="right-panel">
            <div><div class="widget-title">NETWORK TRACING</div><div class="radar-container"><div class="radar"></div></div></div>
            <div>
                <div class="widget-title">TARGET INFO</div>
                <div class="stat-row"><span>NODE:</span> <span class="color-yellow">MIC_ARCHIVE_MAIN</span></div>
                <div class="stat-row"><span>IP SEC:</span> <span class="color-gray">203.0.113.88</span></div>
                <div class="stat-row"><span>STATUS:</span> <span id="status-text" class="color-red blink">VULNERABLE</span></div>
            </div>
            <div>
                <div class="widget-title">SYSTEM RESOURCES</div>
                <div class="stat-row"><span>CPU OVERLOAD:</span> <span id="cpu-val">87%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="cpu-bar" style="width: 87%"></div></div>

                <div class="stat-bar-bg"><div class="stat-bar-fill" id="ram-bar" style="width: 92%"></div></div>
            </div>
            <div style="margin-top: auto; font-size: 12px; color: #005500; font-family: monospace;" id="matrix-codes"></div>
        </div>
    </div>

    <div id="access-granted">ACCESS GRANTED</div>

    <script>
        const fakeCode = `
[+] Memory pointer allocated at: 0x7FFF00A1
function bypassMainframe(target) {
    let proxy = establishEncryptedTunnel();
    if (proxy.status === "ACTIVE") {
        console.log("Decoupling firewall nodes...");
        injectSQL("DROP TABLE security_logs;");
        forceRoot(target);
    }
    return true;
}
// Extracing data streams from MIC_DB_CLASSIFIED...
let dataStream = new DataNode('MIC_DB_CLASSIFIED');
while(dataStream.isLocked) {
    dataStream.applyBruteForce(dictionary_v4);
    print("Decrypting secure block...");
}
console.log("Extracting confidential archives: SUCCESS.");
`;
        const fullText = fakeCode.repeat(100);
        let currentIndex = 0; const charsPerKeystroke = 5; 
        let isAccessGranted = false; let isTypingAllowed = false; let bgLogInterval;

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function getRandomHex(length) {
            let result = ''; const chars = '0123456789ABCDEF';
            for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        async function cyberLoad(containerId, label, duration) {
            const container = document.getElementById(containerId); const uniqueId = Math.random().toString(36).substr(2, 9);
            container.innerHTML = `<div class="cyber-loading-wrapper"><div class="cyber-loading-info"><span class="color-cyan">${label}</span><span id="pct-${uniqueId}">0%</span></div><div class="cyber-bar-bg"><div class="cyber-bar-fill" id="bar-${uniqueId}"></div></div><div class="cyber-hex-stream" id="hex-${uniqueId}">0x00000000 INIT</div></div>`;
            const bar = document.getElementById(`bar-${uniqueId}`); const pct = document.getElementById(`pct-${uniqueId}`); const hexStream = document.getElementById(`hex-${uniqueId}`);
            const steps = 40; const stepTime = duration / steps;
            for (let i = 1; i <= steps; i++) {
                let percent = Math.floor((i / steps) * 100); bar.style.width = percent + '%'; pct.innerText = percent + '%';
                hexStream.innerText = `[0x${getRandomHex(8)}] INJECTING... 0x${getRandomHex(4)}`;
                await sleep(stepTime + Math.random() * (stepTime * 0.8));
            }
            hexStream.innerText = `[0x${getRandomHex(8)}] PROTOCOL BYPASSED SUCCESSFULLY.`; hexStream.style.color = "#00ff00";
        }

        function startDashboardUpdates() {
            setInterval(() => {
                let cpu = Math.floor(Math.random() * 30) + 70; let ram = Math.floor(Math.random() * 20) + 80; 
                document.getElementById('cpu-val').innerText = cpu + '%'; document.getElementById('cpu-bar').style.width = cpu + '%';
                document.getElementById('ram-val').innerText = ram + '%'; document.getElementById('ram-bar').style.width = ram + '%';
            }, 800);
            setInterval(() => {
                let codes = ""; for(let i=0; i<5; i++) codes += `0x${getRandomHex(12)} - ${getRandomHex(4)}<br>`;
                document.getElementById('matrix-codes').innerHTML = codes;
            }, 200);
        }

        // Tạo log chạy ngầm nền
        function spawnBackgroundLogs() {
            const bgLogs = document.getElementById('bg-logs');
            bgLogInterval = setInterval(() => {
                let text = "";
                for(let i = 0; i < 50; i++) text += `${getRandomHex(16)} `;
                bgLogs.innerText = text + bgLogs.innerText;
                if(bgLogs.innerText.length > 5000) bgLogs.innerText = bgLogs.innerText.substring(0, 5000);
            }, 50);
        }

        async function startSequence() {
            document.getElementById('desktop').style.display = 'none';
            const loadingScreen = document.getElementById('loading-screen');
            loadingScreen.style.display = 'flex';
            
            spawnBackgroundLogs(); // Bật log chạy ngầm

            const giantContainer = document.getElementById('giant-container');

            await sleep(800);
            giantContainer.innerHTML += `<div class="giant-text giant-white">Connecting to server...</div>`;
            
            await sleep(1500);
            giantContainer.innerHTML += `<div class="giant-text giant-cyan">MIC Archive System</div>`;
            
            await sleep(1500);
            // Dòng chữ Glitch
            giantContainer.innerHTML += `<div class="giant-text glitch-text" data-text="Access restricted">Access restricted</div>`;
            
            // Lắc màn hình dữ dội một chút
            loadingScreen.style.animation = "shake 0.3s";
            
            await sleep(2500);

            // Xóa log và chuyển qua Terminal
            clearInterval(bgLogInterval);
            loadingScreen.style.display = 'none';
            document.getElementById('terminal').style.display = 'flex'; 
            
            startDashboardUpdates(); 

            const bootDiv = document.getElementById('boot-text');
            const leftPanel = document.getElementById('left-panel'); 

            bootDiv.innerHTML += "Initiating forced connection... <span class='color-yellow'>[MIC_SERVER_01]</span><br>";
            bootDiv.innerHTML += "<div id='loader-1'></div>";
            await cyberLoad('loader-1', 'INJECTING PAYLOAD TO ROOT', 1000);
            
            bootDiv.innerHTML += "<br>System response: <span class='color-red'>Manual override required.</span><br>";
            bootDiv.innerHTML += "Type override command sequence below:<br><br>";
            
            isTypingAllowed = true;
            document.getElementById('cursor').style.display = 'inline-block';
            leftPanel.scrollTop = leftPanel.scrollHeight;
        }

        document.addEventListener('keydown', function(event) {
            if (!isTypingAllowed || isAccessGranted) return;

            if (event.key === 'Enter') {
                // KHI BẤM ENTER: ĐỔI MÀU GIAO DIỆN
                document.getElementById('access-granted').style.display = 'block'; 
                document.body.classList.add('granted'); // Class CSS xử lý đổi màu toàn bộ UI
                document.getElementById('status-text').innerText = "COMPROMISED";
                document.getElementById('status-text').classList.remove('blink');
                
                isAccessGranted = true;            
                document.getElementById('cursor').style.display = 'none'; 
            } else {
                if(event.key === ' ') event.preventDefault();
                const consoleDiv = document.getElementById('console');
                const leftPanel = document.getElementById('left-panel');
                
                let textToAdd = fullText.substring(currentIndex, currentIndex + charsPerKeystroke);
                consoleDiv.textContent += textToAdd;
                currentIndex += charsPerKeystroke;
                leftPanel.scrollTop = leftPanel.scrollHeight;
            }
        });
    </script>
</body>
